<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Stars</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #03030a; --glow-gold: #ffffff; --glow-gold-dim: rgba(163, 15, 15, 1);
  --text: #ffffff; --muted: #6878a0; --panel: rgba(6,6,20,0.92);
}
html,body { width:100%; height:100%; background:var(--void); color:var(--text);
  font-family:'Josefin Sans',sans-serif; overflow:hidden; user-select:none; }
canvas#bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
canvas#graph { position:fixed; inset:0; z-index:1; }
canvas#minimap { position:fixed; bottom:88px; left:18px; z-index:12;
  border:1px solid rgba(163, 15, 15, 1); background:rgba(3,3,12,0.85);
  backdrop-filter:blur(6px); width:160px; height:110px; cursor:crosshair; }

/* ── HEADER ── */
#header { position:fixed; top:0; left:0; right:0; z-index:10;
  padding:22px 32px 0; display:flex; align-items:flex-start; justify-content:space-between;
  pointer-events:none; }
#title-block h1 { font-family:'Cormorant Garamond',serif; font-size:1.75rem; font-weight:300;
  letter-spacing:0.15em; color:var(--glow-gold); text-shadow:0 0 40px rgba(163, 15, 15, 1); line-height:1; }
#title-block p { font-size:0.55rem; letter-spacing:0.38em; text-transform:uppercase; color:var(--muted); margin-top:5px; }
#stats { text-align:right; }
#stats .num { font-family:'Cormorant Garamond',serif; font-size:1.9rem; font-weight:300;
  color:var(--glow-gold); opacity:.65; line-height:1; }
#stats .lbl { font-size:0.48rem; letter-spacing:0.32em; text-transform:uppercase; color:var(--muted); }

/* ── SEARCH ── */
#search-wrap { position:fixed; top:22px; left:50%; transform:translateX(-50%); z-index:10; }
#search { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  color:var(--text); font-family:'Josefin Sans',sans-serif; font-size:0.62rem;
  letter-spacing:0.22em; padding:9px 18px; width:240px; outline:none;
  transition:all .3s; backdrop-filter:blur(8px); text-align:center; }
#search::placeholder { color:var(--muted); }
#search:focus { border-color:rgba(163, 15, 15, 1); box-shadow:0 0 18px rgba(163, 15, 15, 1); }

/* ── DOMAIN FILTERS ── */
#filters { position:fixed; top:72px; left:50%; transform:translateX(-50%); z-index:10;
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:820px; }
.filter-chip { font-family:'Josefin Sans',sans-serif; font-size:0.48rem; letter-spacing:0.2em;
  text-transform:uppercase; padding:5px 12px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.1); color:var(--muted);
  background:rgba(255,255,255,0.02); transition:all .25s; white-space:nowrap; }
.filter-chip:hover { color:var(--text); border-color:rgba(255,255,255,0.25); }
.filter-chip.active { color:#fff; border-color:var(--chip-color,#fff); background:rgba(255,255,255,0.06);
  box-shadow:0 0 12px var(--chip-glow,transparent); }

/* ── ZOOM CONTROLS ── */
#zoom-controls { position:fixed; right:18px; top:50%; transform:translateY(-50%);
  z-index:12; display:flex; flex-direction:column; gap:6px; }
.zc-btn { width:38px; height:38px; display:flex; align-items:center; justify-content:center;
  background:var(--panel); border:1px solid rgba(163, 15, 15, 1); color:var(--glow-gold);
  font-size:1.1rem; cursor:pointer; transition:all .25s; backdrop-filter:blur(8px); }
.zc-btn:hover { background:rgba(163, 15, 15, 1); border-color:rgba(163, 15, 15, 1);
  box-shadow:0 0 16px rgba(163, 15, 15, 1); }
.zc-btn.fit { font-size:0.55rem; letter-spacing:0.1em; }
.zc-divider { height:1px; background:rgba(240,192,96,0.12); margin:3px 0; }

/* ── LEGEND (right side) ── */
#legend { position:fixed; right:70px; top:50%; transform:translateY(-50%);
  z-index:10; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.leg-item { display:flex; align-items:center; gap:8px; }
.leg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.leg-lbl { font-size:0.46rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); }

/* ── BOTTOM CONTROLS ── */
#controls { position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  z-index:12; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.ctrl-btn { background:rgba(255,255,255,0.03); border:1px solid rgba(163, 15, 15, 1);
  color:var(--glow-gold); font-family:'Josefin Sans',sans-serif;
  font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase;
  padding:9px 20px; cursor:pointer; transition:all .3s; backdrop-filter:blur(8px); }
.ctrl-btn:hover { background:rgba(240,192,96,0.09); border-color:rgba(163, 15, 15, 1);
  box-shadow:0 0 16px rgba(163, 15, 15, 1); }
.ctrl-btn.accent { background:rgba(163, 15, 15, 1); border-color:rgba(163, 15, 15, 1); }
.ctrl-btn.green { color:#ffffff; border-color:rgba(80,216,128,0.3); background:rgba(80,216,128,0.04); }
.ctrl-btn.green:hover { background:rgba(80,216,128,0.12); border-color:rgba(80,216,128,0.6); }
.ctrl-btn.active { background:rgba(163, 15, 15, 1); border-color:rgba(163, 15, 15, 1); }

/* ── DETAIL PANEL ── */
#detail-panel { position:fixed; left:18px; top:50%; transform:translateY(-50%);
  width:210px; background:var(--panel); border:1px solid rgba(163, 15, 15, 1);
  backdrop-filter:blur(18px); padding:20px 18px; z-index:12;
  opacity:0; pointer-events:none; transition:opacity .3s; max-height:70vh; overflow-y:auto; }
#detail-panel.show { opacity:1; pointer-events:all; }
#dp-close { position:absolute; top:10px; right:12px; background:none; border:none;
  color:var(--muted); cursor:pointer; font-size:0.85rem; transition:color .2s; }
#dp-close:hover { color:var(--glow-gold); }
#dp-name { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:300;
  color:var(--glow-gold); margin-bottom:4px; }
.dp-cat { font-size:0.47rem; letter-spacing:0.26em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.dp-desc { font-size:0.6rem; line-height:1.75; color:rgba(232,228,216,0.65); margin-bottom:12px; }
.dp-ref { font-size:0.5rem; letter-spacing:0.1em; color:rgba(163, 15, 15, 1); font-style:italic; margin-bottom:12px; line-height:1.6; }
.dp-section-title { font-size:0.46rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
.dp-conn-list { display:flex; flex-wrap:wrap; gap:4px; }
.dp-conn-tag { font-size:0.5rem; letter-spacing:0.1em; border:1px solid rgba(255,255,255,0.1);
  padding:3px 7px; color:rgba(232,228,216,0.45); cursor:pointer; transition:all .2s; }
.dp-conn-tag:hover { border-color:rgba(163, 15, 15, 1); color:var(--glow-gold); }

/* ── TOOLTIP ── */
#tooltip { position:fixed; pointer-events:none; background:var(--panel);
  border:1px solid rgba(163, 15, 15, 1); backdrop-filter:blur(16px);
  padding:12px 16px; max-width:240px; opacity:0; transition:opacity .18s; z-index:20; }
#tooltip.show { opacity:1; }
#tooltip h3 { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:400;
  color:var(--glow-gold); margin-bottom:3px; }
#tooltip p { font-size:0.56rem; letter-spacing:0.08em; color:var(--muted); line-height:1.6; }
#tooltip .tt-tag { display:inline-block; margin-top:6px; font-size:0.46rem;
  letter-spacing:0.2em; text-transform:uppercase; color:var(--muted);
  border:1px solid rgba(255,255,255,0.1); padding:2px 7px; }

/* ── ADD MODAL ── */
#modal-bg { position:fixed; inset:0; z-index:30; background:rgba(3,3,10,0.82);
  backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; }
#modal-bg.open { display:flex; }
#modal { background:rgba(5,5,18,0.98); border:1px solid rgba(163, 15, 15, 1);
  padding:36px 44px; min-width:380px; animation:fadeIn .28s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
#modal h2 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300;
  color:var(--glow-gold); margin-bottom:24px; }
.field { margin-bottom:15px; }
.field label { display:block; font-size:0.5rem; letter-spacing:0.3em; text-transform:uppercase;
  color:var(--muted); margin-bottom:6px; }
.field input,.field select,.field textarea { width:100%; background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.1); color:var(--text);
  font-family:'Josefin Sans',sans-serif; font-size:0.72rem; padding:9px 12px; outline:none; }
.field input:focus,.field select:focus,.field textarea:focus { border-color:rgba(240,192,96,0.38); }
.field select option { background:#07071a; }
.field textarea { resize:vertical; min-height:60px; }
#modal-btns { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }
.modal-btn { font-family:'Josefin Sans',sans-serif; font-size:0.55rem; letter-spacing:0.2em;
  text-transform:uppercase; padding:9px 22px; cursor:pointer; border:1px solid; transition:all .3s; }
.modal-btn.cancel { background:transparent; border-color:rgba(255,255,255,0.1); color:var(--muted); }
.modal-btn.cancel:hover { border-color:rgba(255,255,255,0.28); color:var(--text); }
.modal-btn.confirm { background:rgba(163, 15, 15, 1); border-color:rgba(163, 15, 15, 1); color:var(--glow-gold); }
.modal-btn.confirm:hover { background:rgba(163, 15, 15, 1); box-shadow:0 0 18px rgba(163, 15, 15, 1); }

/* ── TOAST ── */
#toast { position:fixed; bottom:72px; left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid rgba(80,216,128,0.38); color:#ffffff;
  font-size:0.56rem; letter-spacing:0.2em; text-transform:uppercase;
  padding:9px 22px; z-index:50; opacity:0; transition:opacity .4s; pointer-events:none; }
#toast.show { opacity:1; }

/* ── SIMULATION STATUS ── */
#sim-status { position:fixed; bottom:60px; right:18px; z-index:12;
  font-size:0.46rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }

#hint { position:fixed; bottom:56px; left:50%; transform:translateX(-50%);
  font-size:0.46rem; letter-spacing:0.24em; text-transform:uppercase;
  color:rgba(104,120,160,0.4); pointer-events:none; white-space:nowrap; z-index:10; }

/* Scrollbar */
#detail-panel::-webkit-scrollbar { width:3px; }
#detail-panel::-webkit-scrollbar-track { background:transparent; }
#detail-panel::-webkit-scrollbar-thumb { background:rgba(163, 15, 15, 1); }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="graph"></canvas>
<canvas id="minimap"></canvas>

<div id="header">
  <div id="title-block">
    <h1>Project Stars</h1>
    <p>map human thoughts</p>
  </div>
  <div id="stats">
    <div class="num" id="node-count">0</div>
    <div class="lbl">thoughts charted</div>
  </div>
</div>

<div id="search-wrap">
  <input type="text" id="search" placeholder="Search">
</div>

<div id="filters"></div>
<div id="legend"></div>

<div id="zoom-controls">
  <div class="zc-btn" id="zc-in" title="Zoom In">+</div>
  <div class="zc-btn" id="zc-out" title="Zoom Out">−</div>
  <div class="zc-divider"></div>
  <div class="zc-btn fit" id="zc-fit" title="Fit All">FIT</div>
  <div class="zc-btn" id="zc-home" title="Reset">⌂</div>
</div>

<div id="detail-panel">
  <button id="dp-close">✕</button>
  <div id="dp-name"></div>
  <div class="dp-cat" id="dp-cat"></div>
  <div class="dp-desc" id="dp-desc"></div>
  <div class="dp-ref" id="dp-ref"></div>
  <div class="dp-section-title">Connected Thoughts</div>
  <div class="dp-conn-list" id="dp-conns"></div>
</div>

<div id="tooltip">
  <h3 id="tt-name"></h3>
  <p id="tt-desc"></p>
  <div class="tt-tag" id="tt-cat"></div>
</div>

<div id="controls">
  <button class="ctrl-btn accent" id="add-btn">Add Thought</button>
  <button class="ctrl-btn" id="connect-btn">Connect Mode</button>
  <button class="ctrl-btn" id="pause-btn">Pause</button>
  <button class="ctrl-btn" id="layout-btn">Rearrange</button>
  <button class="ctrl-btn green" id="export-btn">Export Map</button>
</div>

<div id="hint">Drag to pan · Scroll to zoom · Click a node to inspect · Double-click for detail</div>
<div id="sim-status"></div>
<div id="toast"></div>

<div id="modal-bg">
  <div id="modal">
    <h2>Chart a New Thought</h2>
    <div class="field"><label>Concept / Thought</label>
      <input type="text" id="m-name" placeholder="e.g. Embodied Cognition, Dark Energy…"></div>
    <div class="field"><label>Description</label>
      <textarea id="m-desc" placeholder="What does this concept encompass?"></textarea></div>
    <div class="field"><label>Scientific Reference (optional)</label>
      <input type="text" id="m-ref" placeholder="e.g. Clark & Chalmers, 1998"></div>
    <div class="field"><label>Domain</label><select id="m-cat"></select></div>
    <div class="field"><label>Connect to (node name, optional)</label>
      <input type="text" id="m-connect" placeholder="e.g. Consciousness, Memory…"></div>
    <div id="modal-btns">
      <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm">Chart It</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════════════════
const CATEGORIES = [
  { id:'philosophy',   label:'Philosophy',         color:'#9060f0', glow:'rgba(144,96,240,.55)' },
  { id:'emotion',      label:'Emotion',            color:'#e06080', glow:'rgba(224,96,128,.55)' },
  { id:'neuroscience', label:'Neuroscience',       color:'#40c8e0', glow:'rgba(64,200,224,.55)' },
  { id:'physics',      label:'Physics & Math',     color:'#c0c8e0', glow:'rgba(192,200,224,.55)' },
  { id:'cognitive',    label:'Cognitive Science',  color:'#f0a040', glow:'rgba(240,160,64,.55)' },
  { id:'art',          label:'Art & Creativity',   color:'#f0c060', glow:'rgba(240,192,96,.55)' },
  { id:'self',         label:'Self & Identity',    color:'#50d880', glow:'rgba(80,216,128,.55)' },
  { id:'society',      label:'Society & Ethics',   color:'#e8954a', glow:'rgba(232,149,74,.55)' },
  { id:'cosmos',       label:'Cosmos & Life',      color:'#7090f0', glow:'rgba(112,144,240,.55)' },
  { id:'spirit',       label:'Spirituality',       color:'#e080c0', glow:'rgba(224,128,192,.55)' },
];
const CMAP = {}; CATEGORIES.forEach(c=>CMAP[c.id]=c);

// ═══════════════════════════════════════════════════════════
// NODES — 92 thoughts grounded in contemporary research
// ═══════════════════════════════════════════════════════════
const SEED_NODES = [
// ── PHILOSOPHY ──
{id:1, label:'Being', cat:'philosophy', r:20,
 desc:'The bedrock of ontology — that something exists rather than nothing. Heidegger called it the forgotten question of Western thought.',
 ref:'Heidegger, Being and Time (1927); Parfit, Reasons and Persons (1984)'},
{id:2, label:'Truth', cat:'philosophy', r:18,
 desc:'The correspondence, coherence, or pragmatic usefulness of a belief. Recent epistemology interrogates how social forces distort what counts as truth.',
 ref:'James, Pragmatism (1907); Fricker, Epistemic Injustice (2007)'},
{id:3, label:'Free Will', cat:'philosophy', r:17,
 desc:'Whether deliberation is genuinely open or secretly determined. Compatibilists argue freedom is compatible with determinism; libertarians deny it.',
 ref:'Kane, The Significance of Free Will (1996); Dennett, Freedom Evolves (2003)'},
{id:4, label:'Consciousness', cat:'philosophy', r:22,
 desc:'Chalmers\'s "hard problem" — why physical processes give rise to subjective experience at all. The central mystery of philosophy of mind.',
 ref:'Chalmers, The Conscious Mind (1996); Nagel, What Is It Like to Be a Bat? (1974)'},
{id:5, label:'Time', cat:'philosophy', r:19,
 desc:'Whether time flows or is a static block universe. Physicists and philosophers remain split on whether the past and future are equally real.',
 ref:'McTaggart, The Unreality of Time (1908); Barbour, The End of Time (1999)'},
{id:6, label:'Causality', cat:'philosophy', r:17,
 desc:'The structure of influence: does cause genuinely produce effect, or is it a pattern we impose on correlated events?',
 ref:'Hume, Enquiry (1748); Pearl, The Book of Why (2018)'},
{id:7, label:'Emergence', cat:'philosophy', r:18,
 desc:'How high-level properties — wetness, life, mind — arise from lower-level parts without being reducible to them.',
 ref:'Anderson, More Is Different (1972); Deacon, Incomplete Nature (2011)'},
{id:8, label:'Phenomenology', cat:'philosophy', r:16,
 desc:'The first-person study of how things appear to consciousness — bracketing assumptions to describe experience directly.',
 ref:'Husserl, Ideas I (1913); Merleau-Ponty, Phenomenology of Perception (1945)'},
{id:9, label:'Determinism', cat:'philosophy', r:15,
 desc:'The thesis that every event, including every thought, is the inevitable result of prior causes and the laws of nature.',
 ref:'Laplace, Philosophical Essay on Probabilities (1814)'},
{id:10, label:'Intentionality', cat:'philosophy', r:14,
 desc:'The "aboutness" of mental states — the fact that thoughts are always directed at something. A mark that distinguishes mind from mere matter.',
 ref:'Brentano, Psychology from an Empirical Standpoint (1874); Searle, Intentionality (1983)'},
{id:11, label:'Paradox', cat:'philosophy', r:15,
 desc:'Two incompatible conclusions, each apparently valid. Paradoxes drive progress in logic, mathematics, and physics.',
 ref:'Russell\'s Paradox (1901); Zeno\'s Paradoxes; Quine, The Ways of Paradox (1966)'},

// ── EMOTION ──
{id:12, label:'Love', cat:'emotion', r:23,
 desc:'Neuroscientifically, love activates reward circuits, suppresses critical social judgment, and releases oxytocin — bonding us across selves.',
 ref:'Fisher, Why We Love (2004); Zeki, The Neurobiology of Love (2007)'},
{id:13, label:'Grief', cat:'emotion', r:17,
 desc:'A non-linear neurobiological process: the brain\'s attempt to update a predictive model that still expects the deceased to exist.',
 ref:'O\'Connor, Grieving (2022 Nature Reviews Neuroscience)'},
{id:14, label:'Wonder', cat:'emotion', r:16,
 desc:'Awe at scale or complexity. Research shows awe measurably shrinks the self-concept and expands social concern — a reset button for the ego.',
 ref:'Keltner & Haidt, Approaching Awe (2003); Stellar et al., Self-Transcendent Emotions (2017)'},
{id:15, label:'Fear', cat:'emotion', r:17,
 desc:'Mediated primarily by the amygdala, fear evolved as a fast-route survival signal — bypassing cortical deliberation in milliseconds.',
 ref:'LeDoux, The Emotional Brain (1996); Ohman, Fear and Anxiety (2000)'},
{id:16, label:'Joy', cat:'emotion', r:19,
 desc:'A state of elevated dopaminergic and serotonergic activity. Barbara Fredrickson\'s broaden-and-build theory: joy expands thought-action repertoires.',
 ref:'Fredrickson, The Broaden-and-Build Theory (2001)'},
{id:17, label:'Loneliness', cat:'emotion', r:16,
 desc:'Chroni loneliness is now classified as a public health crisis. It activates the same neural pain circuits as physical injury — isolation literally hurts.',
 ref:'Cacioppo & Patrick, Loneliness (2008); Holt-Lunstad et al., Social Isolation (2015)'},
{id:18, label:'Empathy', cat:'emotion', r:17,
 desc:'Both affective (feeling with) and cognitive (perspective-taking). Mirror neuron systems partially underpin it — but cultural learning is equally decisive.',
 ref:'Decety & Jackson, The Functional Architecture of Empathy (2004); Singer & Klimecki (2014)'},
{id:19, label:'Shame', cat:'emotion', r:15,
 desc:'A global negative evaluation of the self — distinct from guilt (about acts). Chronic shame is linked to narcissism, depression, and aggression.',
 ref:'Tangney & Dearing, Shame and Guilt (2002); Brown, I Thought It Was Just Me (2007)'},
{id:20, label:'Awe', cat:'emotion', r:16,
 desc:'Triggered by vastness that challenges existing mental schemas. Awe reduces inflammation markers and increases prosocial behavior.',
 ref:'Stellar et al., Awe and Inflammation (2015, Emotion)'},
{id:21, label:'Nostalgia', cat:'emotion', r:14,
 desc:'A bittersweet emotion that boosts social connectedness and meaning. Neuroimaging shows it recruits autobiographical memory and reward systems together.',
 ref:'Wildschut et al., Nostalgia: Content, Triggers, Functions (2006)'},

// ── NEUROSCIENCE ──
{id:22, label:'Predictive Processing', cat:'neuroscience', r:21,
 desc:'The leading theory of brain function: the brain is a prediction machine, constantly generating models of the world and updating on prediction errors. Perception is controlled hallucination.',
 ref:'Clark, Surfing Uncertainty (2016); Friston, The Free-Energy Principle (2010)'},
{id:23, label:'Default Mode Network', cat:'neuroscience', r:18,
 desc:'A brain network active during rest, self-referential thought, and social cognition. Dysregulation links to depression, anxiety, and rumination.',
 ref:'Raichle, The Brain\'s Default Mode Network (2015, Annual Review)'},
{id:24, label:'Neuroplasticity', cat:'neuroscience', r:19,
 desc:'The brain\'s lifelong capacity to rewire synaptic connections in response to experience — overturning the once-dominant view that adult brains are fixed.',
 ref:'Doidge, The Brain That Changes Itself (2007); Merzenich, Soft-Wired (2013)'},
{id:25, label:'Interoception', cat:'neuroscience', r:17,
 desc:'The brain\'s sensing of the body\'s internal state — heartbeat, gut, breath. Increasingly seen as the biological root of emotion, self, and even social awareness.',
 ref:'Craig, How Do You Feel? (2015); Seth, Being You (2021)'},
{id:26, label:'Mirror Neurons', cat:'neuroscience', r:16,
 desc:'Neurons that fire both when executing an action and when observing another perform it. Proposed as a substrate for imitation, empathy, and language acquisition.',
 ref:'Rizzolatti & Sinigaglia, Mirrors in the Brain (2008)'},
{id:27, label:'Synaptic Pruning', cat:'neuroscience', r:14,
 desc:'The adolescent brain eliminates unused synaptic connections — a process of neural editing that shapes personality and vulnerability to psychiatric conditions.',
 ref:'Paus, Keshavan & Giedd, Why Do Many Psychiatric Disorders Emerge in Adolescence? (2008)'},
{id:28, label:'Embodied Cognition', cat:'neuroscience', r:18,
 desc:'Cognition is not computation in a brain-box but is shaped by the whole body and environment. Posture, gesture, and sensation co-constitute thought.',
 ref:'Varela, Thompson & Rosch, The Embodied Mind (1991); Lakoff & Johnson, Philosophy in the Flesh (1999)'},
{id:29, label:'Attention', cat:'neuroscience', r:19,
 desc:'The selective allocation of neural resources. William James called it "the taking possession by the mind." Its voluntary control is the foundation of self-regulation.',
 ref:'Posner, Orienting of Attention (1980); McGilchrist, The Master and His Emissary (2009)'},
{id:30, label:'Sleep & Memory', cat:'neuroscience', r:17,
 desc:'During sleep, the hippocampus replays waking experiences and transfers them to cortical long-term storage — memory consolidation requires unconsciousness.',
 ref:'Walker, Why We Sleep (2017); Wilson & McNaughton (1994, Science)'},
{id:31, label:'Emotional Regulation', cat:'neuroscience', r:16,
 desc:'The set of strategies — reappraisal, suppression, distancing — by which the prefrontal cortex modulates amygdalar responses to emotional stimuli.',
 ref:'Gross, The Emerging Field of Emotion Regulation (1998)'},
{id:32, label:'Salience', cat:'neuroscience', r:15,
 desc:'The salience network (insula + anterior cingulate) determines what reaches conscious awareness — it is the gatekeeper between internal and external worlds.',
 ref:'Menon & Uddin, Saliency, Switching, Attention (2010)'},
{id:33, label:'Glymphatic System', cat:'neuroscience', r:14,
 desc:'The brain\'s waste-clearance system — active during deep sleep — flushes out amyloid and tau proteins implicated in Alzheimer\'s disease.',
 ref:'Iliff et al. (2012, Science Translational Medicine)'},

// ── PHYSICS & MATH ──
{id:34, label:'Entropy', cat:'physics', r:18,
 desc:'The universe\'s tendency toward disorder defines the arrow of time. Boltzmann showed entropy is a measure of the number of microscopic arrangements a system can occupy.',
 ref:'Boltzmann (1872); Carroll, From Eternity to Here (2010)'},
{id:35, label:'Quantum Superposition', cat:'physics', r:18,
 desc:'A quantum system exists in multiple states simultaneously until measured. Schrödinger\'s equation governs superposed states — its interpretation remains contested.',
 ref:'Schrödinger (1935); Everett, Relative State Formulation (1957)'},
{id:36, label:'Infinity', cat:'physics', r:17,
 desc:'Cantor\'s set theory revealed infinite hierarchies of infinity. In physics, infinities in equations often signal the limits of current theory.',

{id:37, label:'Information Theory', cat:'physics', r:17,
 desc:'Shannon\'s formalization of information as a measure of surprise. Modern physics increasingly treats information as fundamental — "it from bit."',
 ref:'Shannon, A Mathematical Theory of Communication (1948); Wheeler (1990)'},
{id:38, label:'Many-Worlds', cat:'physics', r:15,
 desc:'Everett\'s interpretation of quantum mechanics: every quantum event branches the universe into parallel outcomes, all equally real.',
 ref:'Everett (1957); Deutsch, The Fabric of Reality (1997)'},
{id:39, label:'Complexity Theory', cat:'physics', r:16,
 desc:'The science of systems with many interacting parts that produce emergent, unpredictable global behaviors — from ant colonies to economies to consciousness.',
 ref:'Holland, Emergence: From Chaos to Order (1998); Kauffman, The Origins of Order (1993)'},
{id:40, label:'Dark Matter', cat:'physics', r:15,
 desc:'Unknown matter comprising 27% of the universe — inferred from gravitational effects but never directly detected. The universe is mostly invisible to us.',
 ref:'Rubin & Ford (1970); Planck Collaboration (2018)'},
{id:41, label:'Holographic Principle', cat:'physics', r:14,
 desc:'All information in a volume of space can be encoded on its boundary surface — suggesting our three-dimensional universe may be a projection.',
 ref:'\'t Hooft (1993); Susskind (1995); Maldacena, The Large-N Limit (1997)'},

// ── COGNITIVE SCIENCE ──
{id:42, label:'Metacognition', cat:'cognitive', r:18,
 desc:'Thinking about thinking. The ability to monitor and regulate one\'s own cognitive processes — a key differentiator of expert from novice performance.',
 ref:'Flavell, Metacognition and Cognitive Monitoring (1979); Dunning-Kruger (1999)'},
{id:43, label:'Cognitive Bias', cat:'cognitive', r:19,
 desc:'Systematic errors in reasoning arising from mental shortcuts (heuristics). Kahneman and Tversky catalogued over 180 — they are not bugs but evolved features.',
 ref:'Tversky & Kahneman, Judgment Under Uncertainty (1974); Kahneman, Thinking, Fast and Slow (2011)'},
{id:44, label:'Flow State', cat:'cognitive', r:17,
 desc:'Csikszentmihalyi\'s optimal experience: total absorption in a skill-matched challenge, accompanied by loss of self-consciousness and distorted time perception.',
 ref:'Csikszentmihalyi, Flow: The Psychology of Optimal Experience (1990)'},
{id:45, label:'Theory of Mind', cat:'cognitive', r:18,
 desc:'The capacity to attribute mental states — beliefs, desires, intentions — to others. Absent in early autism; it underlies all social complexity and storytelling.',
 ref:'Premack & Woodruff (1978); Baron-Cohen, Leslie & Frith (1985)'},
{id:46, label:'Working Memory', cat:'cognitive', r:16,
 desc:'The cognitive workspace where information is held and manipulated for immediate use. Baddeley\'s model identifies a phonological loop, visuospatial sketchpad, and central executive.',
 ref:'Baddeley & Hitch (1974); Miller, The Magical Number Seven (1956)'},
{id:47, label:'Pattern Recognition', cat:'cognitive', r:17,
 desc:'The brain\'s core operation — finding regularities in noisy sensory data. Both its power and its weakness: we find patterns even where none exist (apophenia).',
 ref:'Gestalt psychology; Kahneman; Shermer, The Believing Brain (2011)'},
{id:48, label:'Decision Making', cat:'cognitive', r:17,
 desc:'Somatic marker hypothesis: emotion is not the enemy of reason but is necessary for rational choice. Patients with prefrontal damage can\'t decide despite intact logic.',

{id:49, label:'Conceptual Metaphor', cat:'cognitive', r:15,
 desc:'Lakoff & Johnson: abstract concepts are structured by embodied metaphors. We understand argument as war, time as a resource, the mind as a container.',
 ref:'Lakoff & Johnson, Metaphors We Live By (1980)'},
{id:50, label:'Linguistic Relativity', cat:'cognitive', r:15,
 desc:'The hypothesis that language shapes thought — weak version widely accepted: different languages predispose different cognitive patterns (color, time, space).',
 ref:'Whorf (1940s); Boroditsky, How Language Shapes Thought (2011)'},
{id:51, label:'Cognitive Load', cat:'cognitive', r:14,
 desc:'Working memory has limited capacity — when overloaded, learning and decision quality collapse. Sweller\'s theory underpins modern instructional design.',
 ref:'Sweller, Cognitive Load During Problem Solving (1988)'},

// ── ART & CREATIVITY ──
{id:52, label:'Beauty', cat:'art', r:19,
 desc:'Kant\'s "free play of imagination and understanding." Neurostheticians find beauty activates the medial orbito-frontal cortex — a region associated with reward.',

{id:53, label:'Story', cat:'art', r:19,
 desc:'The mind\'s primary sense-making form. Narrative activates multiple brain regions simultaneously — motor, sensory, emotional — far more than factual statements.',

{id:54, label:'Music', cat:'art', r:18,
 desc:'Music uniquely activates reward, motor, and emotional circuits simultaneously. Anticipation — tension before resolution — is as pleasurable as the resolution itself.',

{id:55, label:'Imagination', cat:'art', r:20,
 desc:'Shares neural architecture with episodic memory and future simulation — the hippocampus is central to all three. To imagine is to remember a world that hasn\'t happened yet.',

{id:56, label:'Play', cat:'art', r:16,

{id:57, label:'Symbol', cat:'art', r:15,

{id:58, label:'Ritual', cat:'art', r:15,
 desc:'Repeated, symbolic action that coordinates collective emotion and reinforces group identity. Cross-culturally universal — from funerals to handshakes to sport.',

// ── SELF & IDENTITY ──
{id:59, label:'Identity', cat:'self', r:19,
 desc:'Constructed, not discovered. Narrative identity theory: the self is the story we tell about the continuity of our experiences across time.',

{id:60, label:'Memory', cat:'self', r:18,
 desc:'Memory is reconstructive, not reproductive — every act of recall rewrites the trace. Loftus\'s false memory research revolutionized eyewitness testimony law.',

{id:61, label:'Death', cat:'self', r:20,

{id:62, label:'Purpose', cat:'self', r:18,

{id:63, label:'Ego', cat:'self', r:16,
 desc:'The constructed sense of being a unified, continuous self — now understood to be a brain-generated inference, not a fact about the world.',

{id:64, label:'Trauma', cat:'self', r:17,

{id:65, label:'Dream', cat:'self', r:17,

{id:68, label:'Ego Death', cat:'self', r:15,

let nodes=[], edges=[], nextId=200;
let cam={x:0,y:0,z:0.85};
let drag=null, hovered=null, selected=null;
let connectMode=false, connectFrom=null;
let searchTerm='', filterCat=null;
let paused=false, settled=false, simAge=0;
let W, H;

const bgC=document.getElementById('bg');
const bgX=bgC.getContext('2d');
const gc=document.getElementById('graph');
const ctx=gc.getContext('2d');
const mm=document.getElementById('minimap');
const mmx=mm.getContext('2d');

function resize(){
  W=gc.width=bgC.width=window.innerWidth;
  H=gc.height=bgC.height=window.innerHeight;
  drawStars();
}
window.addEventListener('resize',resize);

// ── STARS ──
function pr(n){const x=Math.sin(n+1)*43758.5453;return x-Math.floor(x);}
function drawStars(){
  bgX.clearRect(0,0,W,H);
  // Nebulae
  [[W*.3,H*.35,W*.55,'rgba(60,30,120,0.09)'],[W*.72,H*.6,W*.45,'rgba(30,60,110,0.08)'],[W*.5,H*.8,W*.3,'rgba(100,30,80,0.06)']].forEach(([cx,cy,rad,col])=>{
    const g=bgX.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=g;bgX.fillRect(0,0,W,H);
  });
  for(let i=0;i<500;i++){
    const x=pr(i*3+7)*W,y=pr(i*3+8)*H,r=pr(i*3+9)*1.6,a=0.1+pr(i+7)*.7;
    bgX.beginPath();bgX.arc(x,y,r,0,Math.PI*2);
    bgX.fillStyle=`rgba(${175+Math.floor(pr(i*7)*70)},${175+Math.floor(pr(i*7+1)*70)},${215+Math.floor(pr(i*7+2)*35)},${a})`;
    bgX.fill();
  }
}

// ── INIT ──
function initGraph(){
  const cp={};
  CATEGORIES.forEach((c,i)=>{
    const a=(i/CATEGORIES.length)*Math.PI*2-Math.PI/2, d=260;
    cp[c.id]={x:Math.cos(a)*d,y:Math.sin(a)*d};
  });
  nodes=SEED_NODES.map(n=>{
    const p=cp[n.cat];
    const a=pr(n.id*17)*Math.PI*2, d=50+pr(n.id*31)*130;
    return{...n,x:p.x+Math.cos(a)*d,y:p.y+Math.sin(a)*d,vx:(pr(n.id)-0.5)*3,vy:(pr(n.id*2)-0.5)*3,pinned:false,alpha:1,visible:true};
  });
  edges=SEED_EDGES.map(([a,b])=>({a,b}));
  updateCounter();
}
function nodeById(id){return nodes.find(n=>n.id===id);}
function updateCounter(){document.getElementById('node-count').textContent=nodes.length;}

// ── SIMULATION ──
function tick(){
  if(paused) return;
  simAge++;
  // Cool down after 300 ticks
  const cooling=Math.max(0.3, 1-simAge/400);
  const REPEL=3200*cooling+800, SPRING=0.015, DAMP=0.80, GRAVITY=0.005;

  nodes.forEach(n=>{
    if(n.pinned)return;
    n.vx-=n.x*GRAVITY;n.vy-=n.y*GRAVITY;
    nodes.forEach(m=>{
      if(m===n)return;
      const dx=n.x-m.x,dy=n.y-m.y,d2=dx*dx+dy*dy+4,f=REPEL/d2;
      n.vx+=dx*f;n.vy+=dy*f;
    });
    n.vx*=DAMP;n.vy*=DAMP;
    n.x+=n.vx;n.y+=n.vy;
  });
  edges.forEach(e=>{
    const a=nodeById(e.a),b=nodeById(e.b);if(!a||!b)return;
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const tgt=90+a.r+b.r,f=(d-tgt)*SPRING;
    const fx=dx/d*f,fy=dy/d*f;
    if(!a.pinned){a.vx+=fx;a.vy+=fy;}
    if(!b.pinned){b.vx-=fx;b.vy-=fy;}
  });

  // Compute visibility
  nodes.forEach(n=>{
    const matchSearch=!searchTerm||(n.label.toLowerCase().includes(searchTerm)||n.desc.toLowerCase().includes(searchTerm));
    const matchCat=!filterCat||n.cat===filterCat;
    n.visible=matchSearch&&matchCat;
    n.alpha=n.visible?1:0.07;
  });

  // Status
  if(simAge>350&&!settled){settled=true;}
  document.getElementById('sim-status').textContent=settled?'':'settling…';
}

// ── DRAW MAIN ──
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2+cam.x,H/2+cam.y);
  ctx.scale(cam.z,cam.z);

  // Edges
  edges.forEach(e=>{
    const a=nodeById(e.a),b=nodeById(e.b);if(!a||!b)return;
    const al=Math.min(a.alpha,b.alpha);
    const isSel=selected&&(selected.id===a.id||selected.id===b.id);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    if(isSel){ctx.strokeStyle=`rgba(240,192,96,${0.55*al})`;ctx.lineWidth=1.4;}
    else{ctx.strokeStyle=`rgba(140,155,195,${0.1*al})`;ctx.lineWidth=0.7;}
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n=>{
    const cat=CMAP[n.cat]||CMAP.philosophy;
    const isH=hovered===n,isS=selected===n;
    const a=n.alpha;

    if(isH||isS){
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
      g.addColorStop(0,cat.glow.replace('.55',`.${Math.round(45*a)}`));
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    if(connectMode&&connectFrom===n){
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*5);
      g.addColorStop(0,'rgba(240,192,96,0.35)');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }

    const gr=ctx.createRadialGradient(n.x-n.r*.35,n.y-n.r*.35,0,n.x,n.y,n.r);
    gr.addColorStop(0,cat.color+'f0');
    gr.addColorStop(0.55,cat.color+(Math.round(0xaa*a).toString(16).padStart(2,'0')));
    gr.addColorStop(1,cat.color+(Math.round(0x33*a).toString(16).padStart(2,'0')));
    ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.globalAlpha=1;

    if(isS){ctx.beginPath();ctx.arc(n.x,n.y,n.r+5,0,Math.PI*2);ctx.strokeStyle=`rgba(240,192,96,${0.75*a})`;ctx.lineWidth=1.5;ctx.stroke();}
    else if(isH){ctx.beginPath();ctx.arc(n.x,n.y,n.r+3,0,Math.PI*2);ctx.strokeStyle=`rgba(255,255,255,${0.28*a})`;ctx.lineWidth=1;ctx.stroke();}

    // Label — always show if zoomed in enough or selected/hovered
    const showLabel=cam.z>0.5||isH||isS;
    if(showLabel){
      const labelAlpha=Math.max(0,Math.min(1,(cam.z-0.35)*2.5))*a;
      ctx.globalAlpha=labelAlpha;
      ctx.fillStyle='rgba(235,230,215,1)';
      ctx.font=`${Math.round(9.5/cam.z)}px Josefin Sans`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(n.label,n.x,n.y+n.r+5/cam.z);
      ctx.globalAlpha=1;
    }
  });

  ctx.restore();
}

// ── MINIMAP ──
function drawMinimap(){
  const MW=mm.width=160,MH=mm.height=110;
  mmx.clearRect(0,0,MW,MH);
  mmx.fillStyle='rgba(3,3,12,0.5)';mmx.fillRect(0,0,MW,MH);

  if(!nodes.length)return;
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  nodes.forEach(n=>{mnX=Math.min(mnX,n.x);mxX=Math.max(mxX,n.x);mnY=Math.min(mnY,n.y);mxY=Math.max(mxY,n.y);});
  const pad=30,scx=(MW-pad*2)/(mxX-mnX||1),scy=(MH-pad*2)/(mxY-mnY||1),sc=Math.min(scx,scy);
  const ox=MW/2-(mnX+mxX)/2*sc,oy=MH/2-(mnY+mxY)/2*sc;

  // Edges
  edges.forEach(e=>{
    const a=nodeById(e.a),b=nodeById(e.b);if(!a||!b)return;
    mmx.beginPath();mmx.moveTo(a.x*sc+ox,a.y*sc+oy);mmx.lineTo(b.x*sc+ox,b.y*sc+oy);
    mmx.strokeStyle='rgba(140,155,195,0.18)';mmx.lineWidth=0.5;mmx.stroke();
  });

  // Nodes
  nodes.forEach(n=>{
    const cat=CMAP[n.cat]||CMAP.philosophy;
    mmx.beginPath();mmx.arc(n.x*sc+ox,n.y*sc+oy,Math.max(1.5,n.r*sc),0,Math.PI*2);
    mmx.fillStyle=cat.color+(n.visible?'cc':'33');mmx.fill();
  });

  // Viewport rect
  const vl=(-W/2-cam.x)/cam.z,vt=(-H/2-cam.y)/cam.z;
  const vr=vl+W/cam.z,vb=vt+H/cam.z;
  mmx.strokeStyle='rgba(240,192,96,0.5)';mmx.lineWidth=1;
  mmx.strokeRect(vl*sc+ox,vt*sc+oy,(vr-vl)*sc,(vb-vt)*sc);
}

// ── FIT ALL ──
function fitAll(){
  if(!nodes.length)return;
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  nodes.forEach(n=>{
    mnX=Math.min(mnX,n.x-n.r);mxX=Math.max(mxX,n.x+n.r);
    mnY=Math.min(mnY,n.y-n.r);mxY=Math.max(mxY,n.y+n.r);
  });
  const pad=70;
  const zx=(W-pad*2)/(mxX-mnX||1),zy=(H-pad*2)/(mxY-mnY||1);
  cam.z=Math.min(zx,zy,1.8);
  cam.x=-((mnX+mxX)/2)*cam.z;
  cam.y=-((mnY+mxY)/2)*cam.z;
}

// ── INTERACTION ──
function worldPos(e){
  const r=gc.getBoundingClientRect();
  return{x:(e.clientX-r.left-W/2-cam.x)/cam.z,y:(e.clientY-r.top-H/2-cam.y)/cam.z};
}
function nodeAt(wp){return nodes.find(n=>Math.hypot(n.x-wp.x,n.y-wp.y)<=n.r+7)||null;}

function getConns(n){
  const c=[];
  edges.forEach(e=>{
    if(e.a===n.id){const m=nodeById(e.b);if(m)c.push(m);}
    if(e.b===n.id){const m=nodeById(e.a);if(m)c.push(m);}
  });
  return c;
}

function showPanel(n){
  selected=n;
  document.getElementById('dp-name').textContent=n.label;
  document.getElementById('dp-cat').textContent=CMAP[n.cat]?.label||n.cat;
  document.getElementById('dp-desc').textContent=n.desc||'';
  document.getElementById('dp-ref').textContent=n.ref?'Reference: '+n.ref:'';
  document.getElementById('dp-ref').style.display=n.ref?'block':'none';
  const cl=document.getElementById('dp-conns');cl.innerHTML='';
  getConns(n).forEach(c=>{
    const t=document.createElement('div');t.className='dp-conn-tag';
    t.textContent=c.label;t.onclick=()=>showPanel(c);
    cl.appendChild(t);
  });
  document.getElementById('detail-panel').classList.add('show');
}

gc.style.cursor='grab';

gc.addEventListener('mousemove',e=>{
  const wp=worldPos(e);
  hovered=nodeAt(wp);
  gc.style.cursor=hovered?'pointer':(drag?'grabbing':'grab');
  if(drag){
    if(drag.node){drag.node.x=wp.x;drag.node.y=wp.y;drag.node.pinned=true;}
    else{cam.x+=e.clientX-drag.lx;cam.y+=e.clientY-drag.ly;drag.lx=e.clientX;drag.ly=e.clientY;}
  }
  const tt=document.getElementById('tooltip');
  if(hovered){
    tt.classList.add('show');
    document.getElementById('tt-name').textContent=hovered.label;
    document.getElementById('tt-desc').textContent=hovered.desc?.slice(0,110)+(hovered.desc?.length>110?'…':'')||'';
    document.getElementById('tt-cat').textContent=CMAP[hovered.cat]?.label||'';
    let tx=e.clientX+16,ty=e.clientY-8;
    if(tx+250>W)tx=e.clientX-260;if(ty+120>H)ty=e.clientY-120;
    tt.style.left=tx+'px';tt.style.top=ty+'px';
  }else{tt.classList.remove('show');}
});

let lastClick=0;
gc.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const wp=worldPos(e);const n=nodeAt(wp);
  if(n){
    if(connectMode){
      if(!connectFrom){connectFrom=n;}
      else if(connectFrom!==n){
        const ex=edges.find(ed=>(ed.a===connectFrom.id&&ed.b===n.id)||(ed.b===connectFrom.id&&ed.a===n.id));
        if(!ex)edges.push({a:connectFrom.id,b:n.id});
        connectFrom=null;
      }
    }else{
      drag={node:n};n.pinned=true;
      const now=Date.now();
      if(now-lastClick<340){showPanel(n);}else{selected=n;}
      lastClick=now;
    }
  }else{
    drag={lx:e.clientX,ly:e.clientY};
    selected=null;
    document.getElementById('detail-panel').classList.remove('show');
  }
});
gc.addEventListener('mouseup',()=>{if(drag?.node)setTimeout(()=>{if(drag)drag.node.pinned=false;},800);drag=null;});
gc.addEventListener('mouseleave',()=>{drag=null;});
gc.addEventListener('wheel',e=>{
  e.preventDefault();
  const prev=cam.z,f=e.deltaY<0?1.1:0.91;
  cam.z=Math.max(0.12,Math.min(4,cam.z*f));
  // Zoom toward mouse
  const r=gc.getBoundingClientRect();
  const mx=e.clientX-r.left-W/2,my=e.clientY-r.top-H/2;
  cam.x=mx-(mx-cam.x)*(cam.z/prev);
  cam.y=my-(my-cam.y)*(cam.z/prev);
},{passive:false});

// Minimap click: pan to that region
mm.addEventListener('click',e=>{
  const r=mm.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  nodes.forEach(n=>{mnX=Math.min(mnX,n.x);mxX=Math.max(mxX,n.x);mnY=Math.min(mnY,n.y);mxY=Math.max(mxY,n.y);});
  const pad=30,MW=160,MH=110;
  const sc=Math.min((MW-pad*2)/(mxX-mnX||1),(MH-pad*2)/(mxY-mnY||1));
  const ox=MW/2-(mnX+mxX)/2*sc,oy=MH/2-(mnY+mxY)/2*sc;
  const worldX=(mx-ox)/sc,worldY=(my-oy)/sc;
  cam.x=-worldX*cam.z;cam.y=-worldY*cam.z;
});

// Touch
let touchStart=null;
gc.addEventListener('touchstart',e=>{e.preventDefault();
  const t=e.touches[0];const wp=worldPos(t);const n=nodeAt(wp);
  if(n){drag={node:n};n.pinned=true;selected=n;}
  else{drag={lx:t.clientX,ly:t.clientY};}
},{passive:false});
gc.addEventListener('touchmove',e=>{e.preventDefault();
  const t=e.touches[0];const wp=worldPos(t);
  if(drag?.node){drag.node.x=wp.x;drag.node.y=wp.y;}
  else if(drag){cam.x+=t.clientX-drag.lx;cam.y+=t.clientY-drag.ly;drag.lx=t.clientX;drag.ly=t.clientY;}
},{passive:false});
gc.addEventListener('touchend',()=>{if(drag?.node)setTimeout(()=>{if(drag)drag.node.pinned=false;},800);drag=null;});

// ── CONTROLS ──
document.getElementById('zc-in').onclick=()=>{cam.z=Math.min(4,cam.z*1.2);};
document.getElementById('zc-out').onclick=()=>{cam.z=Math.max(0.12,cam.z/1.2);};
document.getElementById('zc-fit').onclick=fitAll;
document.getElementById('zc-home').onclick=()=>{cam={x:0,y:0,z:0.85};};

document.getElementById('pause-btn').onclick=function(){
  paused=!paused;
  this.textContent=paused?'Resume':'Pause';
  this.classList.toggle('active',paused);
};
document.getElementById('layout-btn').onclick=()=>{
  settled=false;simAge=0;
  nodes.forEach(n=>{n.x=(Math.random()-.5)*700;n.y=(Math.random()-.5)*700;n.vx=(Math.random()-.5)*8;n.vy=(Math.random()-.5)*8;});
};
document.getElementById('connect-btn').onclick=function(){
  connectMode=!connectMode;connectFrom=null;
  this.classList.toggle('active',connectMode);
  this.textContent=connectMode?'✕ Exit Connect':'Connect Mode';
};
document.getElementById('dp-close').onclick=()=>{
  document.getElementById('detail-panel').classList.remove('show');selected=null;
};

// Search
document.getElementById('search').addEventListener('input',e=>{
  searchTerm=e.target.value.toLowerCase().trim();
});

// Domain filters
const filterBar=document.getElementById('filters');
const allChip=document.createElement('div');
allChip.className='filter-chip active';allChip.textContent='All';
allChip.style.setProperty('--chip-color','rgba(240,192,96,0.6)');
allChip.style.setProperty('--chip-glow','rgba(240,192,96,0.2)');
allChip.onclick=()=>{filterCat=null;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));allChip.classList.add('active');};
filterBar.appendChild(allChip);
CATEGORIES.forEach(c=>{
  const chip=document.createElement('div');
  chip.className='filter-chip';chip.textContent=c.label;
  chip.style.setProperty('--chip-color',c.color);
  chip.style.setProperty('--chip-glow',c.glow);
  chip.onclick=()=>{
    if(filterCat===c.id){filterCat=null;chip.classList.remove('active');allChip.classList.add('active');}
    else{filterCat=c.id;document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));chip.classList.add('active');}
  };
  filterBar.appendChild(chip);
});

// Legend
const leg=document.getElementById('legend');
CATEGORIES.forEach(c=>{
  const d=document.createElement('div');d.className='leg-item';
  d.innerHTML=`<div class="leg-dot" style="background:${c.color};box-shadow:0 0 5px ${c.color}88"></div><span class="leg-lbl">${c.label}</span>`;
  leg.appendChild(d);
});

// Add modal
const catSel=document.getElementById('m-cat');
CATEGORIES.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.label;catSel.appendChild(o);});
document.getElementById('add-btn').onclick=()=>document.getElementById('modal-bg').classList.add('open');
document.getElementById('modal-cancel').onclick=()=>document.getElementById('modal-bg').classList.remove('open');
document.getElementById('modal-bg').onclick=e=>{if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');};
document.getElementById('modal-confirm').onclick=()=>{
  const label=document.getElementById('m-name').value.trim();if(!label)return;
  const desc=document.getElementById('m-desc').value.trim();
  const ref=document.getElementById('m-ref').value.trim();
  const catId=document.getElementById('m-cat').value;
  const connectTo=document.getElementById('m-connect').value.trim().toLowerCase();
  const a=Math.random()*Math.PI*2,d=100+Math.random()*200;
  const nn={id:++nextId,label,desc,ref,cat:catId,x:Math.cos(a)*d,y:Math.sin(a)*d,vx:0,vy:0,r:14,pinned:false,alpha:1,visible:true};
  nodes.push(nn);
  if(connectTo){const t=nodes.find(n=>n.label.toLowerCase()===connectTo);if(t)edges.push({a:nn.id,b:t.id});}
  updateCounter();
  ['m-name','m-desc','m-ref','m-connect'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-bg').classList.remove('open');
  toast(`"${label}" added to the map`);
};

// Export
document.getElementById('export-btn').onclick=()=>{
  const data={
    meta:{title:'Cartography of the Mind',exported:new Date().toISOString(),nodes:nodes.length,edges:edges.length},
    categories:CATEGORIES,
    nodes:nodes.map(n=>({id:n.id,label:n.label,cat:n.cat,desc:n.desc,ref:n.ref||'',x:Math.round(n.x),y:Math.round(n.y),r:n.r})),
    edges:edges.map(e=>({from:e.a,to:e.b,fromLabel:nodeById(e.a)?.label,toLabel:nodeById(e.b)?.label}))
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`mind-map-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast(`Exported ${nodes.length} thoughts · ${edges.length} connections`);
};

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

// ── LOOP ──
function loop(){
  tick();draw();drawMinimap();
  requestAnimationFrame(loop);
}

resize();
initGraph();
// Auto fit after a short settle
setTimeout(fitAll,1200);
loop();
</script>
